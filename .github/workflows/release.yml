name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (CI check)
        run: npm run ci

      - name: Package Electron app
        run: npm run release

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CanDao-${{ steps.version.outputs.VERSION }}-win-x64
          path: release/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CanDao ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release/*.exe
          body: |
            ## CanDao ${{ github.ref_name }}

            ### 安装说明
            下载 `CanDao Setup ${{ steps.version.outputs.VERSION }}.exe`，双击运行安装程序。

            ### 更新内容
            - 详见 [CHANGELOG](./CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
